services:
  db:
    image: postgres:15
    container_name: devflow-db
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
